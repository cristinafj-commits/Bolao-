name: Sincronizador Automático de Resultados (Robô)

on:
  schedule:
    # Roda a cada 2 horas todos os dias (ajuste como achar melhor)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permite que você ative o robô manualmente pelo botão no GitHub!

permissions:
  contents: read

jobs:
  sync:
    name: Sincronizar Jogos no Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Executar robô de sincronização
        env:
          # Sua chave do Football-Data.org cadastrada nos Secrets do repositório no GitHub
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npm run sync-scores
